<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>GLSL-Pathtracer-JS</title>
    <style>body {
      margin: 0;
      background: #23272e;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      color: #e0e0e0;
    }
    
    .playerCanvas {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      border-radius: 6px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.45);
      background: #181b20;
    }
    </style>
    <script>
      (function(){
          var oldLog = console.info;
          console.info = function (...data) {
              var message = data.map(d => {
                  if (typeof d === 'object') {
                      try {
                          return JSON.stringify(d, null, 2);
                      } catch (e) {
                          return String(d);
                      }
                  }
                  return String(d);
              }).join(' ');
              const logger = document.getElementById('info');
              if (logger) logger.innerHTML = message;
          };
      })();

      (function(){
          var oldClear = console.clear;
          console.clear = function (...data) {
              const logger = document.getElementById('info');
              if (logger) logger.innerHTML = '';
          };
      })();
    </script>
    <script>
      function getSceneName() {
        let scene = '';

        if (window.location.search != '') {
          // get scene parameter from query
          const urlParams = new URLSearchParams(window.location.search);
          scene = urlParams.get('scene');
        }
        
        if (scene == '') {
          scene = 'volumecube';
        }

        return scene;
      }

      async function watchInit() {
        const canvas = document.getElementById('canvas');

        const scene = getSceneName();

        // change Url
        const newUrl = `?scene=${scene}`;
        history.pushState(null, '', newUrl);

        const config = {
          document: document,
          canvas: canvas,
          scene: scene
        };

        await window.loadSceneAsync(config);
      }
    </script>
  </head>
  <body onload="watchInit()">
    <canvas id="canvas" class="playerCanvas">
    </canvas>
    <span style="
      position: absolute;
      top: 10px;
      left: 60px;
      padding: 10px;
      display: flex;
      gap: 4px;
      background: rgba(35, 39, 46, 0.7);
      z-index: 10;
      align-items: center;
    ">
      <pre id="info" style="text-align: left; max-height: 40px;"></pre>
    </span>
    <script type="module">
      import { Main } from './dist/main.js';
      window.fullScreen = async function() {
        const canvas = document.getElementById('canvas');
        if (canvas.requestFullscreen) {
          await canvas.requestFullscreen();
        } else if (canvas.mozRequestFullScreen) {
          await canvas.mozRequestFullScreen();
        } else if (canvas.webkitRequestFullscreen) {
          await canvas.webkitRequestFullscreen();
        } else if (canvas.msRequestFullscreen) {
          await canvas.msRequestFullscreen();
        }
        canvas.focus();
      }
      window.loadSceneAsync = async function(config) {
        await Main.instance.runAsync(config);
      }
      window.setSceneName = function(name) {
        window.sceneName = name;
      }
    </script>
  </body>
</html>
